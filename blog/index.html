    .control-group select { width: 100%; }

];

let selectedTags = [];
const postList = document.getElementById('post-list');
const sortSelect = document.getElementById('sort-select');
const filterTagsContainer = document.getElementById('filter-tags');
const clearFiltersBtn = document.getElementById('clear-filters');
const resultsCount = document.getElementById('results-count');

function getAllTags() {
  const tags = new Set();
  posts.forEach(post => post.tags.forEach(tag => tags.add(tag)));
  return Array.from(tags).sort();
}

function renderFilterButtons() {
  const tags = getAllTags();
  filterTagsContainer.innerHTML = tags.map(tag =>
    `<button class="filter-btn" data-tag="${tag}">${tag}</button>`
  ).join('');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.tag;
      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
      } else {
        selectedTags.push(tag);
      }
      renderPosts();
      updateFilterButtons();
    });
  });
}

function updateFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const tag = btn.dataset.tag;
    btn.classList.toggle('active', selectedTags.includes(tag));
  });
  clearFiltersBtn.style.display = selectedTags.length > 0 ? 'inline' : 'none';
}

function sortPosts(postsToSort) {
  const sortValue = sortSelect.value;
  const sorted = [...postsToSort];

  switch(sortValue) {
    case 'date-asc':
      return sorted.sort((a, b) => new Date(a.date) - new Date(b.date));
    case 'title':
      return sorted.sort((a, b) => a.title.localeCompare(b.title));
    default: // date-desc
      return sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
  }
}

function renderPosts() {
  let filtered = posts;

  if (selectedTags.length > 0) {
    filtered = posts.filter(post =>
      selectedTags.some(tag => post.tags.includes(tag))
    );
  }

  const sorted = sortPosts(filtered);

  postList.innerHTML = sorted.map(post => {
    const readTimeText = post.readTime ? `<span>${post.readTime} min read</span>` : '';
    const categoryText = `<span>${post.category}</span>`;
    return `
      <article class="post-card">
        <a href="${post.url}" class="post-title-link"><h2>${post.title}</h2></a>
        <p class="excerpt">${post.excerpt}</p>
        <div class="post-meta">${readTimeText}${readTimeText ? categoryText : `${categoryText}`}</div>
        ${post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
      </article>
    `;
  }).join('');

  resultsCount.textContent = `${sorted.length} post${sorted.length !== 1 ? 's' : ''}`;
}

sortSelect.addEventListener('change', renderPosts);

clearFiltersBtn.addEventListener('click', () => {
  selectedTags = [];
  renderPosts();
  updateFilterButtons();
});

renderFilterButtons();
renderPosts();
</script>
