<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Limits Status</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div class="limits-widget">
    <div class="limits-widget-header">
      <div>
        <div class="limits-widget-title">
          <span class="icon">⏰</span>
          <span>Claude Limits Status</span>
        </div>
        <div class="limits-widget-time" id="widget-time"></div>
      </div>
      <div class="limits-current-status" id="current-status"></div>
    </div>

    <div class="limits-bar-section">
      <div class="limits-hourly-bars" id="hourly-bars">
        <!-- 24 hour blocks will be generated by JavaScript -->
      </div>

      <div class="limits-quick-info">
        <div class="limits-quick-item">
          <div class="limits-quick-label">Current Period</div>
          <div class="limits-quick-value" id="info-current-period">—</div>
        </div>
        <div class="limits-quick-item">
          <div class="limits-quick-label">Time Until Change</div>
          <div class="limits-quick-value" id="info-time-until">—</div>
        </div>
      </div>
    </div>

    <div class="limits-status-section">
      <div class="limits-status-label">System Status</div>
      <div class="limits-status-indicator" id="status-indicator">
        <div class="limits-status-dot" id="status-dot"></div>
        <div class="limits-status-text" id="status-text">Checking...</div>
      </div>
    </div>

    <div class="limits-legend">
      <div class="limits-legend-item">
        <span class="limits-legend-box limits-legend-red"></span>
        <span>Peak Hours (16:00–01:00 UTC)</span>
      </div>
      <div class="limits-legend-item">
        <span class="limits-legend-box limits-legend-green"></span>
        <span>Best Time (01:00–16:00 UTC)</span>
      </div>
    </div>
  </div>

  <script src="widget.js"></script>
</body>
</html>
